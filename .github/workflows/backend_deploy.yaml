name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
      # ========== 1. 代码检出 ==========
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 2. 环境验证 ==========
      - name: Validate Required Secrets
        run: |
          echo "🔍 Validating required secrets..."
          REQUIRED_SECRETS=("CLOUDFLARE_ACCOUNT_ID" "CLOUDFLARE_API_TOKEN" "BACKEND_TOML")
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "❌ $secret is not set in GitHub Secrets"
              exit 1
            fi
          done
          echo "✅ All required secrets are set"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BACKEND_TOML: ${{ secrets.BACKEND_TOML }}

      # ========== 3. 设置 Node.js ==========
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: false

      # ========== 4. 设置 pnpm ==========
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ========== 5. 缓存依赖 ==========
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            worker/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # ========== 6. 构建前端（可选） ==========
      - name: Build Frontend Assets
        run: |
          echo "🏗️ Building frontend assets..."
          
          # 检查是否需要构建前端
          if [ -z "$USE_WORKER_ASSETS" ]; then
            echo "⏭️ Skipping frontend build (USE_WORKER_ASSETS not set)"
            exit 0
          fi
          
          cd frontend/
          pnpm install --frozen-lockfile
          
          if [ -n "$USE_WORKER_ASSETS_WITH_TELEGRAM" ]; then
            echo "📱 Building with Telegram pages support"
            pnpm build:telegram:pages
          else
            echo "📱 Building with normal pages support"
            pnpm build:pages
          fi
          
          # 验证构建产物
          if [ ! -d "dist" ] && [ ! -d "build" ]; then
            echo "❌ Frontend build failed - no output directory found"
            exit 1
          fi
          
          echo "✅ Frontend build completed"
          cd ..
        env:
          USE_WORKER_ASSETS: ${{ secrets.USE_WORKER_ASSETS }}
          USE_WORKER_ASSETS_WITH_TELEGRAM: ${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}

      # ========== 7. 配置 Worker ==========
      - name: Configure Worker
        working-directory: worker
        run: |
          echo "⚙️ Configuring worker..."
          
          # 写入 wrangler.toml
          if [ -z "$WRANGLER_TOML_CONTENT" ]; then
            echo "❌ BACKEND_TOML secret is empty"
            exit 1
          fi
          
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          
          # 验证配置文件
          if [ ! -s "wrangler.toml" ]; then
            echo "❌ Failed to create wrangler.toml"
            exit 1
          fi
          
          echo "📄 wrangler.toml content preview:"
          head -n 10 wrangler.toml
          echo "..."
          
          # 提取 worker 名称
          WORKER_NAME=$(grep -E "^name =" wrangler.toml | sed 's/name = "\(.*\)"/\1/')
          if [ -n "$WORKER_NAME" ]; then
            echo "WORKER_NAME=$WORKER_NAME" >> $GITHUB_ENV
            echo "✅ Worker name: $WORKER_NAME"
          else
            echo "⚠️  Could not extract worker name from wrangler.toml"
          fi
        env:
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}

      # ========== 8. 检查 WASM 补丁状态 ==========
      - name: Check WASM Patch Status
        id: wasm-check
        run: |
          if [ -n "$BACKEND_USE_MAIL_WASM_PARSER" ]; then
            echo "has_wasm_patch=true" >> $GITHUB_OUTPUT
            echo "🧩 WASM patch will be applied"
          else
            echo "has_wasm_patch=false" >> $GITHUB_OUTPUT
            echo "⏭️ No WASM patch needed"
          fi
        env:
          BACKEND_USE_MAIL_WASM_PARSER: ${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}

      # ========== 9. 安装 Worker 依赖 ==========
      - name: Install Worker Dependencies
        working-directory: worker
        run: |
          echo "📦 Installing worker dependencies..."
          if [ "$HAS_WASM_PATCH" = "true" ]; then
            pnpm install --no-frozen-lockfile
          else
            pnpm install --frozen-lockfile
          fi
          echo "✅ Dependencies installed"
        env:
          HAS_WASM_PATCH: ${{ steps.wasm-check.outputs.has_wasm_patch }}

      # ========== 10. 应用 WASM 补丁（可选） ==========
      - name: Apply WASM Parser Patch
        if: steps.wasm-check.outputs.has_wasm_patch == 'true'
        working-directory: worker
        run: |
          echo "🧩 Applying mail-parser-wasm-worker patch..."
          
          echo "📦 Adding mail-parser-wasm-worker..."
          pnpm add mail-parser-wasm-worker
          
          if [ -f "../.github/config/mail-parser-wasm-worker.patch" ]; then
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "✅ Patch applied successfully"
          else
            echo "⚠️  Patch file not found, continuing..."
          fi
          
          echo "🔄 Updating lockfile with patched dependencies..."
          pnpm install --no-frozen-lockfile
          echo "✅ Lockfile updated"

      # ========== 11. 执行部署 ==========
      - name: Deploy to Cloudflare Workers
        id: deploy
        working-directory: worker
        run: |
          echo "🚀 Deploying to Cloudflare Workers..."
          echo "🔧 Debug mode: $DEBUG_MODE"
          
          # 创建部署日志文件
          DEPLOY_LOG="deploy-$(date +%Y%m%d-%H%M%S).log"
          
          # 如果有 WASM 补丁，确保依赖是最新的
          if [ "$HAS_WASM_PATCH" = "true" ]; then
            echo "📦 Ensuring patched dependencies are installed..."
            pnpm install --no-frozen-lockfile
          fi
          
          # 执行部署
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "📋 Running in debug mode with full output..."
            if pnpm run deploy 2>&1 | tee "$DEPLOY_LOG"; then
              DEPLOY_SUCCESS=true
            else
              DEPLOY_SUCCESS=false
            fi
          else
            echo "📋 Running in production mode..."
            if pnpm run deploy 2>&1 | tee "$DEPLOY_LOG"; then
              DEPLOY_SUCCESS=true
            else
              DEPLOY_SUCCESS=false
            fi
          fi
          
          # 设置部署结果
          if [ "$DEPLOY_SUCCESS" = true ]; then
            echo "✅ Deployment successful!"
            echo "deploy_status=success" >> $GITHUB_OUTPUT
            echo "deploy_log=$DEPLOY_LOG" >> $GITHUB_OUTPUT
          else
            EXIT_CODE=$?
            echo "❌ Deployment failed with exit code: $EXIT_CODE"
            echo "deploy_status=failed" >> $GITHUB_OUTPUT
            echo "deploy_log=$DEPLOY_LOG" >> $GITHUB_OUTPUT
            echo "deploy_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
            exit $EXIT_CODE
          fi
          
          # 提取部署 URL
          if [ -f "$DEPLOY_LOG" ]; then
            DEPLOY_URL=$(grep -o "https://[^ ]*\.workers\.dev" "$DEPLOY_LOG" | head -n 1)
            if [ -n "$DEPLOY_URL" ]; then
              echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
              echo "🌐 Deployment URL: $DEPLOY_URL"
            fi
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEBUG_MODE: ${{ secrets.DEBUG_MODE }}
          HAS_WASM_PATCH: ${{ steps.wasm-check.outputs.has_wasm_patch }}

      # ========== 12. 上传部署日志 ==========
      - name: Upload Deployment Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs-${{ github.run_id }}
          path: |
            worker/deploy-*.log
            worker/wrangler.toml
            worker/pnpm-lock.yaml
          retention-days: 7
          if-no-files-found: ignore

      # ========== 13. 记录部署摘要 ==========
      - name: Deployment Summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 Deployment Summary"
          echo "=========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Status: ${{ steps.deploy.outputs.deploy_status }}"
          echo "URL: ${{ steps.deploy.outputs.deploy_url || 'N/A' }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="
          
          # 写入 GitHub 步骤摘要
          {
            echo "## 📊 Deployment Summary"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 仓库 | ${{ github.repository }} |"
            echo "| 引用 | ${{ github.ref_name }} |"
            echo "| 提交 | ${{ github.sha }} |"
            echo "| 状态 | ${{ steps.deploy.outputs.deploy_status }} |"
            echo "| URL | ${{ steps.deploy.outputs.deploy_url || 'N/A' }} |"
            echo "| 运行 | [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> $GITHUB_STEP_SUMMARY

      # ========== 14. 发送 Slack 通知（可选） ==========
      - name: Send Slack Notification
        if: always()
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⏭️ Skipping Slack notification (SLACK_WEBHOOK_URL not set)"
            exit 0
          fi
          
          DEPLOY_STATUS="${{ steps.deploy.outputs.deploy_status }}"
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          
          if [ "$DEPLOY_STATUS" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Success"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Failed"
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"🚀 *Deployment Status*\nRepository: ${{ github.repository }}\nRef: ${{ github.ref_name }}\nStatus: $STATUS_EMOJI $STATUS_TEXT\nURL: ${DEPLOY_URL:-N/A}\nLogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
